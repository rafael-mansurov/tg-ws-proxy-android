<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>TG WS Proxy</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      padding: env(safe-area-inset-top, 16px) 0 env(safe-area-inset-bottom, 16px);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      background:
        radial-gradient(ellipse 85% 70% at 12% 18%, rgba(34,158,217,0.28), transparent 58%),
        radial-gradient(ellipse 75% 65% at 88% 72%, rgba(99,102,241,0.22), transparent 55%),
        radial-gradient(ellipse 55% 50% at 62% 8%, rgba(52,211,153,0.14), transparent 50%),
        linear-gradient(165deg, #dde3eb 0%, #e8ecf2 38%, #dce4ee 100%);
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      flex-shrink: 0;
      padding: 12px 18px 14px;
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(255,255,255,0.22);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.42);
    }
    .hicon {
      width: 40px; height: 40px;
      background: rgba(34,158,217,0.92);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.28);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.35);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; color: #fff;
    }
    .hicon svg { width: 22px; height: 22px; display: block; }
    .htitles { flex: 1; min-width: 0; }
    .htitle { color: rgba(12,12,14,0.94); font-size: 15px; font-weight: 600; letter-spacing: -0.02em; }
    .hsub { color: rgba(55,55,65,0.62); font-size: 11px; font-weight: 500; margin-top: 2px; }

    .toggle-wrap { display: flex; flex-direction: column; align-items: center; gap: 5px; flex-shrink: 0; cursor: pointer; }
    .toggle-track {
      width: 48px; height: 26px; border-radius: 13px;
      background: rgba(0,0,0,0.07);
      border: 1px solid rgba(255,255,255,0.35);
      position: relative;
      transition: background 0.2s, border-color 0.2s;
    }
    .toggle-track.on { background: rgba(34,158,217,0.88); border-color: rgba(255,255,255,0.28); }
    .toggle-thumb {
      position: absolute;
      width: 20px; height: 20px;
      background: rgba(255,255,255,0.98);
      border-radius: 50%;
      top: 2px; left: 3px;
      transition: left 0.2s cubic-bezier(0.4,0,0.2,1);
      box-shadow: 0 1px 4px rgba(0,0,0,0.18);
    }
    .toggle-track.on .toggle-thumb { left: 23px; }
    .toggle-lbl { font-size: 9px; font-weight: 500; color: rgba(100,100,110,0.4); transition: color 0.2s; }
    .toggle-track.on + .toggle-lbl { color: rgba(34,158,217,0.7); }

    /* ── Content ── */
    .content {
      flex: 1;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
    }

    /* ── Status ── */
    .status {
      border-radius: 14px;
      padding: 14px;
      display: flex; align-items: center; gap: 12px;
      transition: background 0.25s, border-color 0.25s;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .status.off {
      background: rgba(255,255,255,0.34);
      border: 1px solid rgba(255,255,255,0.5);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.6);
    }
    .status.on {
      background: rgba(209,250,229,0.42);
      border: 1px solid rgba(167,243,208,0.55);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.55);
    }
    .dot-ring {
      width: 30px; height: 30px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.25s;
    }
    .status.off .dot-ring { background: rgba(255,255,255,0.45); }
    .status.on  .dot-ring { background: rgba(167,243,208,0.55); }
    .dot { width: 8px; height: 8px; border-radius: 50%; transition: background 0.25s; }
    .status.off .dot { background: #a1a1aa; }
    .status.on  .dot { background: #059669; animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.45} }
    .status-texts { display: flex; flex-direction: column; gap: 3px; }
    .status-title { font-size: 13px; font-weight: 600; letter-spacing: -0.01em; transition: color 0.25s; }
    .status.off .status-title { color: rgba(70,70,80,0.75); }
    .status.on  .status-title { color: #047857; }
    .status-sub { font-size: 11px; transition: color 0.25s; }
    .status.off .status-sub { color: rgba(120,120,130,0.6); }
    .status.on  .status-sub { color: #0d9488; }
    .status.wait {
      background: rgba(255,255,255,0.4);
      border: 1px solid rgba(255,255,255,0.55);
    }
    .status.wait .status-title { color: rgba(34,158,217,0.95); }
    .status.wait .status-sub { color: rgba(70,90,110,0.8); }
    .dot.wait { background: rgba(34,158,217,0.9); animation: blink 0.9s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }

    /* ── Cards ── */
    .row { display: flex; gap: 10px; }
    .card {
      background: rgba(255,255,255,0.32);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.48);
      border-radius: 14px;
      padding: 12px 14px;
      flex: 1; min-width: 0;
      display: flex; flex-direction: column; gap: 6px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.55);
    }
    .clabel { color: rgba(80,80,92,0.58); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
    .cvalue { color: rgba(12,12,14,0.92); font-size: 14px; font-weight: 600; font-family: ui-monospace,'SFMono-Regular',Menlo,monospace; letter-spacing: -0.02em; }
    .cvalue.secret { color: #229ED9; font-size: 11px; font-weight: 500; word-break: break-all; line-height: 1.45; transition: color 0.2s; }
    .cvalue.secret.dim { color: rgba(180,180,190,0.45); }

    .spacer { flex: 1; min-height: 8px; }

    /* ── Button ── */
    .btn {
      width: 100%;
      border: 1px solid transparent;
      border-radius: 14px;
      padding: 15px 16px;
      font-size: 14px; font-weight: 600;
      letter-spacing: -0.01em;
      font-family: inherit; cursor: pointer;
      transition: background 0.2s, color 0.2s, opacity 0.15s;
    }
    .btn.on {
      background: rgba(34,158,217,0.92);
      color: #fff;
      border-color: rgba(255,255,255,0.28);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.32);
    }
    .btn.on:active { opacity: 0.88; }
    .btn.off {
      background: rgba(255,255,255,0.28);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: rgba(130,130,140,0.55);
      border-color: rgba(255,255,255,0.4);
      cursor: not-allowed;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.45);
    }

    /* ── QR ── */
    .qr-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .qr-wrap.is-hidden { display: none; }
    .qr-label { font-size: 10px; font-weight: 600; color: rgba(80,80,92,0.58); text-transform: uppercase; letter-spacing: 0.06em; }
    .qr-frame {
      display: flex; align-items: center; justify-content: center;
      width: fit-content; height: fit-content; margin: 0 auto;
      padding: 0; border: none; border-radius: 10px;
      background: transparent;
      box-shadow: none;
      overflow: visible;
    }
    .qr-svg-host { display: none; width: 132px; height: 132px; line-height: 0; }
    .qr-svg-host.visible { display: block; }
    .qr-svg-host svg { display: block; width: 132px; height: 132px; }
    .qr-placeholder { font-size: 11px; font-weight: 500; color: rgba(120,120,130,0.58); text-align: center; line-height: 1.35; padding: 0 12px; }
    .qr-placeholder.hidden { display: none !important; visibility: hidden; height: 0; padding: 0; overflow: hidden; }
  </style>
</head>
<body>

  <div class="header">
    <div class="hicon">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <div class="htitles">
      <div class="htitle">TG WS Proxy</div>
      <div class="hsub">MTProto · локальный</div>
    </div>
    <div class="toggle-wrap" onclick="onToggle()">
      <div class="toggle-track" id="toggle"><div class="toggle-thumb"></div></div>
      <div class="toggle-lbl" id="toggle-lbl">Выкл</div>
    </div>
  </div>

  <div class="content">
    <div class="status off" id="status">
      <div class="dot-ring"><div class="dot"></div></div>
      <div class="status-texts">
        <div class="status-title" id="status-title">Остановлен</div>
        <div class="status-sub" id="status-sub">Включите тумблер для запуска</div>
      </div>
    </div>

    <div class="row">
      <div class="card">
        <div class="clabel">Сервер</div>
        <div class="cvalue">127.0.0.1</div>
      </div>
      <div class="card" style="flex:0.6">
        <div class="clabel">Порт</div>
        <div class="cvalue">1443</div>
      </div>
    </div>

    <div class="card">
      <div class="clabel">Secret</div>
      <div class="cvalue secret dim" id="secret-val">––––––––––––––––</div>
    </div>

    <div class="spacer"></div>

    <button type="button" class="btn off" id="tg-btn" onclick="openTelegram()">Открыть в Telegram</button>

    <div class="qr-wrap is-hidden" id="qr-section">
      <div class="qr-label">QR для Telegram</div>
      <div class="qr-frame">
        <div id="qr-svg-host" class="qr-svg-host"></div>
        <div class="qr-placeholder" id="qr-placeholder">Загрузка QR…</div>
      </div>
    </div>

    <div id="log-section" style="display:none;margin-top:12px">
      <div style="font-size:11px;font-weight:600;color:#64748b;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em">Лог сервиса</div>
      <pre id="log-box" style="background:#0f172a;color:#94a3b8;font-size:10px;line-height:1.5;padding:10px;border-radius:10px;overflow-x:auto;white-space:pre-wrap;word-break:break-all;max-height:260px;overflow-y:auto;margin:0"></pre>
    </div>
    <button type="button" id="log-btn" onclick="toggleLogs()" style="margin-top:10px;width:100%;background:none;border:1px solid #e2e8f0;border-radius:10px;padding:9px;font-size:13px;color:#64748b;cursor:pointer">Показать логи</button>
  </div>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1/build/qrcode.min.js"></script>
<script>
  let running = false;
  let secret = null;
  let linkHost = null;
  let uiBusy = false;

  function setStartBusy(on) {
    uiBusy = on;
    const tw = document.querySelector('.toggle-wrap');
    tw.style.pointerEvents = on ? 'none' : '';
    tw.style.opacity = on ? '0.55' : '';
    const st = document.getElementById('status');
    const dot = st.querySelector('.dot');
    if (on) {
      st.className = 'status wait';
      dot.classList.add('wait');
      document.getElementById('status-title').textContent = 'Запуск…';
      document.getElementById('status-sub').textContent =
        'Ждём сервис и прогрев соединений (до ~30 с)';
    } else {
      dot.classList.remove('wait');
    }
  }

  function proxyUrl() {
    const host = linkHost || '127.0.0.1';
    return `tg://proxy?server=${host}&port=1443&secret=dd${secret}`;
  }

  function updateUI(isRunning, sec, lh) {
    running = isRunning;
    secret = sec || secret;
    if (lh) linkHost = lh;

    document.getElementById('toggle').classList.toggle('on', running);
    document.getElementById('toggle-lbl').textContent = running ? 'Вкл' : 'Выкл';
    document.getElementById('status').className = 'status ' + (running ? 'on' : 'off');
    document.getElementById('status-title').textContent = running ? 'Прокси запущен' : 'Остановлен';
    document.getElementById('status-sub').textContent  = running ? 'Работает в фоне' : 'Включите тумблер для запуска';
    const sv = document.getElementById('secret-val');
    sv.textContent = running && secret ? secret : '––––––––––––––––';
    sv.classList.toggle('dim', !running);
    document.getElementById('tg-btn').className = 'btn ' + (running ? 'on' : 'off');
    const qr = document.getElementById('qr-section');
    qr.classList.toggle('is-hidden', !running);
    if (running) refreshQr();
  }

  async function onToggle() {
    const endpoint = running ? '/api/stop' : '/api/start';
    const turningOn = !running;
    if (turningOn) setStartBusy(true);
    try {
      const r = await fetch(endpoint, { method: 'POST' });
      const d = await r.json();
      if (!d.ok) {
        updateUI(false, null);
        if (d.error) alert(d.error);
        return;
      }
      updateUI(d.running, d.secret, d.link_host);
    } catch(e) {
      console.error(e);
      if (turningOn) updateUI(false, null);
    } finally {
      if (turningOn) setStartBusy(false);
    }
  }

  let logsVisible = false;
  async function toggleLogs() {
    const section = document.getElementById('log-section');
    const btn = document.getElementById('log-btn');
    logsVisible = !logsVisible;
    if (!logsVisible) {
      section.style.display = 'none';
      btn.textContent = 'Показать логи';
      return;
    }
    section.style.display = 'block';
    btn.textContent = 'Скрыть логи';
    try {
      const r = await fetch('/api/logs');
      const d = await r.json();
      const box = document.getElementById('log-box');
      box.textContent = d.log || '(пусто)';
      box.scrollTop = box.scrollHeight;
    } catch(e) {
      document.getElementById('log-box').textContent = 'Ошибка загрузки лога: ' + e;
    }
  }

  function openTelegram() {
    if (!running || !secret) return;
    window.location.href = proxyUrl();
  }

  function refreshQr() {
    const host = document.getElementById('qr-svg-host');
    const ph   = document.getElementById('qr-placeholder');
    if (!running || !secret) return;
    if (typeof QRCode === 'undefined') { ph.textContent = 'QR недоступен'; return; }
    ph.classList.add('hidden');
    QRCode.toString(proxyUrl(), { type:'svg', width:132, margin:0, color:{dark:'#0f172a',light:'#e8ecf2'} },
      (err, svg) => {
        if (err || !running) return;
        host.innerHTML = svg;
        host.classList.add('visible');
      }
    );
  }

  // Poll status every 3s to stay in sync with the service
  async function pollStatus() {
    if (uiBusy) return;
    try {
      const r = await fetch('/api/status');
      const d = await r.json();
      updateUI(d.running, d.secret, d.link_host);
    } catch(e) {}
  }

  pollStatus();
  setInterval(pollStatus, 3000);
</script>
</body>
</html>
