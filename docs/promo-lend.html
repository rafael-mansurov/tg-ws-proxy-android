<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Telegram Proxy для Android</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --marathon-black: #0e1015;
      --marathon-white: #ffffff;
      /* Общий сдвиг «пятен» к низу экрана */
      --blobs-offset-y: clamp(168px, 46dvh, 480px);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html {
      margin: 0;
      height: 100%;
      background-color: var(--marathon-black);
      overflow: hidden;
      overscroll-behavior: none;
    }

    body {
      margin: 0;
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      font-family: "Inter", system-ui, sans-serif;
      background-color: var(--marathon-black);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
    }

    .frame {
      position: relative;
      width: 100%;
      height: 100%;
      max-height: 100%;
      padding: 0;
      background-color: var(--marathon-black);
      /* Мягче стыки: два слоя вместо одного резкого перехода */
      background-image:
        radial-gradient(
          ellipse 160% 100% at 50% 124%,
          rgba(32, 22, 48, 0.22) 0%,
          transparent 52%
        ),
        radial-gradient(
          ellipse 130% 95% at 50% 182%,
          rgba(32, 22, 48, 0.45) 0%,
          transparent 62%
        );
      /* visible оставлял «хвосты» blur — растягивался документ и появлялся скролл */
      overflow: hidden;
    }

    /*
     * Фоновые пятна: как в Figma — обёртка (x, y + bounding box поворота),
     * внутри эллипс заданного размера, rotate −56.07°, layer blur.
     * Размеры обёрток — AABB повёрнутого прямоугольника (из экспорта макета).
     */
    .frame__mesh {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      /* overflow:hidden здесь обрезает halo от filter:blur() — даёт ровную линию по краю слоя */
      overflow: visible;
      /* translateY отдельно от scaleX: иначе при невалидном calc весь transform отбрасывается */
      transform: translateY(var(--blobs-offset-y));
    }

    .frame__mesh-scaler {
      position: absolute;
      inset: 0;
      transform-origin: 50% 82%;
    }

    @media (max-width: 767px) {
      .frame__mesh {
        transform: translateY(
          calc(var(--blobs-offset-y) + clamp(100px, 14dvh, 188px))
        );
      }
    }

    /* Десктоп / планшет: пятна и туман на всю ширину; до 767px — как в макете */
    @media (min-width: 768px) {
      .frame {
        background-image:
          radial-gradient(
            ellipse 240% 115% at 50% 124%,
            rgba(32, 22, 48, 0.22) 0%,
            transparent 52%
          ),
          radial-gradient(
            ellipse 220% 100% at 50% 182%,
            rgba(32, 22, 48, 0.45) 0%,
            transparent 62%
          );
      }

      /*
       * Холст пятен = ширина макета, строго по центру экрана.
       * scaleX от середины — при росте окна расширяется симметрично, не «ползёт» влево.
       */
      .frame__mesh {
        inset: 0;
        width: auto;
        margin-left: 0;
        transform: translateY(
          calc(var(--blobs-offset-y) + clamp(320px, 46dvh, 840px))
        );
      }

      /*
       * Без потолка по X на ультраширине всё сливается в одно пятно из‑за blur.
       * По Y — сильное растяжение от transform-origin у низа.
       * Чуть меньше blur на десктопе — разделяются цвета 1…4.
       */
      .frame__mesh-scaler {
        inset: auto;
        left: 50%;
        top: 0;
        bottom: 0;
        width: 390px;
        margin-left: -195px;
        transform: scale(
          min(2.35, calc(100vw / 390px)),
          1.42
        );
        transform-origin: 50% 96%;
      }

      .frame__blob-inner--1 {
        filter: blur(105px);
      }

      .frame__blob-inner--2 {
        filter: blur(48px);
      }

      .frame__blob-inner--3,
      .frame__blob-inner--4 {
        filter: blur(78px);
      }
    }

    .frame__blob-wrap {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .frame__blob-inner {
      flex: none;
      border-radius: 50%;
      transform: rotate(-56.07deg);
    }

    /* 1: #0011FF, blur 153.48, x −261 y 115, 238.23×468.33 */
    .frame__blob-wrap--1 {
      left: -261px;
      top: 115px;
      width: 521.556px;
      height: 459.088px;
    }

    .frame__blob-inner--1 {
      width: 238.23px;
      height: 468.33px;
      background: #0011ff;
      filter: blur(153.48px);
    }

    /* 2: #FF6652, blur 60, x −157 y 148, 185.62×308.23 */
    .frame__blob-wrap--2 {
      left: -157px;
      top: 148px;
      width: 359.354px;
      height: 326.065px;
    }

    .frame__blob-inner--2 {
      width: 185.62px;
      height: 308.23px;
      background: #ff6652;
      filter: blur(60px);
    }

    /* 3: #FF0004, blur 123.48, x 54 y 210, 148.06×199.13 */
    .frame__blob-wrap--3 {
      left: 54px;
      top: 210px;
      width: 247.866px;
      height: 234px;
    }

    .frame__blob-inner--3 {
      width: 148.06px;
      height: 199.13px;
      background: #ff0004;
      filter: blur(123.48px);
    }

    /* 4: #FF5100, blur 123.48, x 234 y 210, 148.06×199.13 */
    .frame__blob-wrap--4 {
      left: 234px;
      top: 210px;
      width: 247.866px;
      height: 234px;
    }

    .frame__blob-inner--4 {
      width: 148.06px;
      height: 199.13px;
      background: #ff5100;
      filter: blur(123.48px);
    }

    /* Иконка + текст по центру; высота внутри .frame без выхода за 100% */
    .frame__center {
      position: relative;
      z-index: 1;
      box-sizing: border-box;
      height: 100%;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 40px calc(72px + env(safe-area-inset-bottom, 0px));
    }

    @keyframes promo-main-fade {
      from {
        opacity: 0;
        transform: translate3d(0, 10px, 0);
      }
      to {
        opacity: 1;
        transform: translate3d(0, 0, 0);
      }
    }

    .frame__main {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 31px;
      flex-shrink: 0;
      opacity: 0;
      /* Сначала иконка + текст, затем кнопка — см. задержку .frame__cta-wrap */
      animation: promo-main-fade 0.55s ease-out 0s both;
    }

    .app-icon {
      width: 59px;
      height: 59px;
      flex-shrink: 0;
      background: rgba(14, 16, 21, 0.2);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .app-icon__img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    @media (min-width: 768px) {
      .app-icon {
        width: 72px;
        height: 72px;
      }
    }

    .title {
      margin: 0;
      width: 243px;
      font-weight: 500;
      font-size: 18px;
      line-height: 1.32;
      text-align: center;
      color: var(--marathon-white);
    }

    @keyframes promo-cta-slide-up {
      from {
        opacity: 0;
        transform: translate3d(0, 100%, 0);
      }
      to {
        opacity: 1;
        transform: translate3d(0, 0, 0);
      }
    }

    .frame__cta-wrap {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 2;
      display: flex;
      justify-content: center;
      padding: 0 40px max(28px, calc(12px + env(safe-area-inset-bottom, 0px)));
      /* pointer-events:none на родителе ломает :hover у ссылки в части браузеров */
      pointer-events: auto;
      opacity: 0;
      /* Старт после окончания promo-main-fade (0.55s) + небольшая пауза */
      animation: promo-cta-slide-up 0.58s cubic-bezier(0.22, 1, 0.36, 1) 0.68s both;
    }

    @media (prefers-reduced-motion: reduce) {
      .frame__main,
      .frame__cta-wrap {
        animation: none;
        opacity: 1;
        transform: none;
      }
    }

    .cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 8px 16px;
      border-radius: 1000px;
      background: var(--marathon-white);
      border: none;
      cursor: pointer;
      font-family: inherit;
      appearance: none;
      -webkit-appearance: none;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
      transition:
        background-color 0.22s ease,
        box-shadow 0.22s ease,
        transform 0.22s cubic-bezier(0.22, 1, 0.36, 1);
    }

    @media (hover: hover) and (pointer: fine) {
      .cta:hover {
        background: var(--marathon-white);
        transform: translateY(-3px) scale(1.04);
        box-shadow:
          0 14px 36px rgba(0, 0, 0, 0.5),
          0 6px 14px rgba(0, 0, 0, 0.32);
      }
    }

    .cta:active {
      transform: scale(0.98);
    }

    .cta__label {
      font-weight: 700;
      font-size: 14px;
      line-height: normal;
      text-align: center;
      color: var(--marathon-black);
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="frame" data-node-id="3058:12129">
    <div class="frame__mesh" aria-hidden="true">
      <div class="frame__mesh-scaler">
        <div class="frame__blob-wrap frame__blob-wrap--1">
          <div class="frame__blob-inner frame__blob-inner--1"></div>
        </div>
        <div class="frame__blob-wrap frame__blob-wrap--2">
          <div class="frame__blob-inner frame__blob-inner--2"></div>
        </div>
        <div class="frame__blob-wrap frame__blob-wrap--3">
          <div class="frame__blob-inner frame__blob-inner--3"></div>
        </div>
        <div class="frame__blob-wrap frame__blob-wrap--4">
          <div class="frame__blob-inner frame__blob-inner--4"></div>
        </div>
      </div>
    </div>

    <div class="frame__center">
      <div class="frame__main" data-node-id="3058:12134">
        <div class="app-icon" data-node-id="3058:12139" data-name="app-icon">
          <img
            class="app-icon__img"
            src="https://raw.githubusercontent.com/rafael-mansurov/tg-ws-proxy-android/main/icon.png"
            alt=""
            width="59"
            height="59"
            decoding="async"
          />
        </div>
        <p class="title" data-node-id="3058:12141">Telegram Proxy для&nbsp;Android</p>
      </div>
    </div>

    <div class="frame__cta-wrap" data-node-id="3058:12142">
      <a
        class="cta"
        href="https://t.me/+Wvhxt3_QTusyOWYy"
        target="_blank"
        rel="noopener noreferrer"
        data-node-id="3058:12143"
      >
        <span class="cta__label">Скачать бесплатно</span>
      </a>
    </div>
  </div>
  <script>
    (function () {
      function allowInteractive(t) {
        return t && t.closest && t.closest("a, button, input, textarea, select");
      }
      function stopScroll(e) {
        if (allowInteractive(e.target)) return;
        e.preventDefault();
      }
      document.addEventListener("wheel", stopScroll, { passive: false });
      document.addEventListener("touchmove", stopScroll, { passive: false });
    })();
  </script>
</body>
</html>
