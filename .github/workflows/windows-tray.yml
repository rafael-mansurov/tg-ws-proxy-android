name: Windows tray (contrib)

# Сборка one-file TGWSProxyTray.exe (PyInstaller), ZIP в Release и (опционально) Telegram.
# Android — отдельно в build.yml.

on:
  push:
    branches: [main]
    paths:
      - "contrib/tgwsproxy_tray_windows.py"
      - "contrib/tgwsproxy_tray_windows.spec"
      - "contrib/requirements-tray-windows.txt"
      - "proxy/**"
      - "scripts/*.py"
      - ".github/scripts/telegram_windows_release.py"
      - ".github/workflows/windows-tray.yml"
  workflow_dispatch:

jobs:
  tray:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Зависимости, PyInstaller, сборка .exe
        run: |
          python -m pip install --upgrade pip
          python -m pip install "pyinstaller>=6.0"
          python -m pip install -r contrib/requirements-tray-windows.txt
          python -m py_compile contrib/tgwsproxy_tray_windows.py
          python -m PyInstaller --noconfirm contrib/tgwsproxy_tray_windows.spec
          if (-not (Test-Path "dist/TGWSProxyTray.exe")) { throw "dist/TGWSProxyTray.exe missing" }

      - name: Собрать ZIP (exe + README)
        run: |
          New-Item -ItemType Directory -Force staging | Out-Null
          Copy-Item -Force "dist/TGWSProxyTray.exe" "staging/TGWSProxyTray.exe"
          $readme = @(
            "TG WS Proxy — один файл TGWSProxyTray.exe",
            "",
            "1) Распакуйте архив.",
            "2) Запустите TGWSProxyTray.exe (двойной клик).",
            "3) Иконка — в области уведомлений Windows (часть иконок в «скрытых»).",
            "4) SmartScreen может спросить подтверждение — это нормально для неподписанного .exe.",
            "",
            "Python и клон репозитория не нужны. Настройки и секрет: %LOCALAPPDATA%\TGWSProxy"
          )
          $readme | Set-Content -Encoding utf8 "staging/README-WINDOWS.txt"
          Compress-Archive -Path "staging/*" -DestinationPath "tg-ws-proxy-windows-tray.zip" -Force

      - name: Артефакт ZIP
        uses: actions/upload-artifact@v4
        with:
          name: windows-tray-zip
          path: tg-ws-proxy-windows-tray.zip
          retention-days: 30

      - name: Release latest-windows-tray
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view latest-windows-tray --repo "${{ github.repository }}" &>/dev/null; then
            gh release delete latest-windows-tray --cleanup-tag --yes --repo "${{ github.repository }}"
          fi
          gh release create latest-windows-tray tg-ws-proxy-windows-tray.zip \
            --repo "${{ github.repository }}" \
            --title "Программа для Windows (трей)" \
            --notes "В архиве одна программа: распакуйте и запустите. Отдельно ставить Python не нужно." \
            --latest=false

      - name: Telegram — успех
        if: success()
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_EXE_THREAD_ID: ${{ secrets.TELEGRAM_EXE_THREAD_ID }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python .github/scripts/telegram_windows_release.py

      - name: Telegram — ошибка
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_EXE_THREAD_ID: ${{ secrets.TELEGRAM_EXE_THREAD_ID }}
        run: |
          if (-not $env:TELEGRAM_BOT_TOKEN -or -not $env:TELEGRAM_CHAT_ID) { exit 0 }
          $url = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          $msg = "❌ <b>Windows</b> — сборка не удалась.`n`n<a href=`"$url`">Что пошло не так</a>"
          $send = @{ chat_id = $env:TELEGRAM_CHAT_ID; text = $msg; parse_mode = "HTML"; disable_web_page_preview = $true }
          $tid = $env:TELEGRAM_EXE_THREAD_ID
          if (-not [string]::IsNullOrWhiteSpace($tid)) { $send['message_thread_id'] = [int64]$tid }
          $json = $send | ConvertTo-Json -Compress
          Invoke-RestMethod -Uri "https://api.telegram.org/bot$($env:TELEGRAM_BOT_TOKEN)/sendMessage" -Method Post -Body $json -ContentType "application/json; charset=utf-8"
