name: Windows tray (contrib)

# Это не APK: проверка скрипта трея, ZIP в Release и (опционально) Telegram.
# Android по-прежнему в build.yml.

on:
  push:
    branches: [main]
    paths:
      - "contrib/tgwsproxy_tray_windows.py"
      - "contrib/requirements-tray-windows.txt"
      - ".github/workflows/windows-tray.yml"
  workflow_dispatch:

jobs:
  tray:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Зависимости и синтаксис
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r contrib/requirements-tray-windows.txt
          python -m py_compile contrib/tgwsproxy_tray_windows.py

      - name: Собрать ZIP
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p staging/contrib
          cp contrib/tgwsproxy_tray_windows.py contrib/requirements-tray-windows.txt staging/contrib/
          cat > staging/README-WINDOWS-TRAY.txt <<'EOF'
          TG WS Proxy — иконка в системном трее (Windows).

          Нужен полный клон репозитория: скрипт считает корнем проекта каталог-родитель contrib/.

          В корне репозитория:
            pip install -r contrib/requirements-tray-windows.txt
            pythonw.exe contrib\tgwsproxy_tray_windows.py

          Состояние и секрет: %LOCALAPPDATA%\TGWSProxy
          EOF
          ( cd staging && powershell -NoProfile -Command "Compress-Archive -Path * -DestinationPath ../tg-ws-proxy-windows-tray.zip -Force" )

      - name: Артефакт ZIP
        uses: actions/upload-artifact@v4
        with:
          name: windows-tray-zip
          path: tg-ws-proxy-windows-tray.zip
          retention-days: 30

      - name: Release latest-windows-tray
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view latest-windows-tray --repo "${{ github.repository }}" &>/dev/null; then
            gh release delete latest-windows-tray --cleanup-tag --yes --repo "${{ github.repository }}"
          fi
          gh release create latest-windows-tray tg-ws-proxy-windows-tray.zip \
            --repo "${{ github.repository }}" \
            --title "Windows: трей-контроллер" \
            --notes "Архив со скриптом трея и requirements. Клонировать весь репозиторий и запускать из корня (см. README в ZIP)." \
            --latest=false

      - name: Telegram — успех
        if: success()
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if (-not $env:TELEGRAM_BOT_TOKEN -or -not $env:TELEGRAM_CHAT_ID) {
            Write-Host "Telegram: секреты не заданы, пропуск."
            exit 0
          }
          $dl = "${{ github.server_url }}/${{ github.repository }}/releases/download/latest-windows-tray/tg-ws-proxy-windows-tray.zip"
          $msg = "✅ TG WS Proxy — Windows tray`n`nСкачать ZIP:`n$dl"
          $send = @{ chat_id = $env:TELEGRAM_CHAT_ID; text = $msg; disable_web_page_preview = $true }
          $json = $send | ConvertTo-Json -Compress
          Invoke-RestMethod -Uri "https://api.telegram.org/bot$($env:TELEGRAM_BOT_TOKEN)/sendMessage" -Method Post -Body $json -ContentType "application/json; charset=utf-8"
          curl.exe -fsS -X POST "https://api.telegram.org/bot$($env:TELEGRAM_BOT_TOKEN)/sendDocument" `
            -F "chat_id=$($env:TELEGRAM_CHAT_ID)" -F "document=@tg-ws-proxy-windows-tray.zip" -F "caption=tg-ws-proxy-windows-tray.zip"

      - name: Telegram — ошибка
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if (-not $env:TELEGRAM_BOT_TOKEN -or -not $env:TELEGRAM_CHAT_ID) { exit 0 }
          $url = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          $msg = "❌ Windows tray workflow упал`n$url"
          $send = @{ chat_id = $env:TELEGRAM_CHAT_ID; text = $msg; disable_web_page_preview = $true }
          $json = $send | ConvertTo-Json -Compress
          Invoke-RestMethod -Uri "https://api.telegram.org/bot$($env:TELEGRAM_BOT_TOKEN)/sendMessage" -Method Post -Body $json -ContentType "application/json; charset=utf-8"
