name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Cache Buildozer (project + Android SDK home)
        uses: actions/cache@v4
        with:
          path: |
            .buildozer
            /home/runner/.buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}-v4-sdkhome
          restore-keys: |
            buildozer-${{ hashFiles('buildozer.spec') }}-
            buildozer-

      - name: Build APK (kivy/buildozer docker)
        run: |
          mkdir -p "${HOME}/.buildozer"
          docker run --rm \
            -v "${{ github.workspace }}:/home/user/hostcwd" \
            -v "${HOME}/.buildozer:/home/user/.buildozer" \
            kivy/buildozer:latest \
            android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tg-ws-proxy-debug
          path: bin/*.apk
          retention-days: 30

      - name: Публичный APK и ZIP в Release
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          APK=$(ls -1 bin/*.apk | head -1)
          cp -f "$APK" tg-ws-proxy-debug.apk
          zip -j tg-ws-proxy-debug.zip tg-ws-proxy-debug.apk
          if gh release view latest-apk --repo "${{ github.repository }}" &>/dev/null; then
            gh release delete latest-apk --cleanup-tag --yes --repo "${{ github.repository }}"
          fi
          gh release create latest-apk tg-ws-proxy-debug.apk tg-ws-proxy-debug.zip \
            --repo "${{ github.repository }}" \
            --title "Последняя сборка (debug)" \
            --notes "Автосборка ${{ github.sha }} · [лог Actions](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" \
            --latest=false

      - name: Telegram — успех (ссылки APK и ZIP)
        if: success()
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram: секреты не заданы, пропуск."
            exit 0
          fi
          BASE="${{ github.server_url }}/${{ github.repository }}/releases/download/latest-apk"
          DL_ZIP="${BASE}/tg-ws-proxy-debug.zip"
          DL_APK="${BASE}/tg-ws-proxy-debug.apk"
          MSG=$(printf '%s\n\n%s\n%s\n\n%s\n%s\n\n%s\n%s\n' \
            "✅ tg-ws-proxy собран" \
            "Скачать ZIP (открываешь ссылку → скачивается архив с APK):" \
            "${DL_ZIP}" \
            "Или APK без zip:" \
            "${DL_APK}" \
            "Коммит: ${GITHUB_SHA:0:7}" \
            "Лог: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}")
          BODY=$(jq -n --arg c "$TELEGRAM_CHAT_ID" --arg t "$MSG" \
            '{chat_id: $c, text: $t, disable_web_page_preview: true}')
          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$BODY"

      - name: Telegram — ошибка
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            exit 0
          fi
          MSG=$(printf '%s\n%s' \
            "❌ Сборка APK упала" \
            "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}")
          BODY=$(jq -n --arg c "$TELEGRAM_CHAT_ID" --arg t "$MSG" \
            '{chat_id: $c, text: $t, disable_web_page_preview: true}')
          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$BODY"
