name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Cache .buildozer
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}-v3
          restore-keys: buildozer-

      - name: Build APK (kivy/buildozer docker)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/home/user/hostcwd" \
            kivy/buildozer:latest \
            android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tg-ws-proxy-debug
          path: bin/*.apk
          retention-days: 30
