name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Подготовка версии (растет на каждом запуске)
        run: |
          set -euo pipefail
          BASE_VERSION=$(awk -F' = ' '/^version = / {print $2}' buildozer.spec | cut -d. -f1-2)
          if [ -z "${BASE_VERSION}" ]; then
            BASE_VERSION="1.0"
          fi
          APP_VERSION="${BASE_VERSION}.${GITHUB_RUN_NUMBER}"
          sed -i.bak -E "s/^version = .*/version = ${APP_VERSION}/" buildozer.spec
          rm -f buildozer.spec.bak
          echo "APP_VERSION=${APP_VERSION}" >> "${GITHUB_ENV}"

      - name: Настройка подписи и типа сборки
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_ALIAS_PASSWORD: ${{ secrets.ANDROID_KEY_ALIAS_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -n "${ANDROID_KEYSTORE_BASE64}" ] && [ -n "${ANDROID_KEYSTORE_PASSWORD}" ] && [ -n "${ANDROID_KEY_ALIAS}" ] && [ -n "${ANDROID_KEY_ALIAS_PASSWORD}" ]; then
            mkdir -p .ci
            echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > .ci/release.keystore
            chmod 600 .ci/release.keystore

            echo "BUILD_MODE=release" >> "${GITHUB_ENV}"
            echo "P4A_RELEASE_KEYSTORE_PASSWD=${ANDROID_KEYSTORE_PASSWORD}" >> "${GITHUB_ENV}"
            echo "P4A_RELEASE_KEYALIAS_PASSWD=${ANDROID_KEY_ALIAS_PASSWORD}" >> "${GITHUB_ENV}"
          else
            echo "::warning::Release signing secrets are missing. Building debug APK (not suitable for stable in-place upgrades)."
            echo "BUILD_MODE=debug" >> "${GITHUB_ENV}"
          fi

      - name: Cache Buildozer (project + Android SDK home)
        uses: actions/cache@v4
        with:
          path: |
            .buildozer
            /home/runner/.buildozer
          key: buildozer-${{ hashFiles('buildozer.spec', 'icon.png', 'presplash.png', 'tools/p4a_hook.py', 'tools/p4a_webview_loader/**', 'tools/p4a_python_activity/**') }}-v7-sdkhome
          restore-keys: |
            buildozer-${{ hashFiles('buildozer.spec') }}-
            buildozer-

      - name: Build APK (kivy/buildozer docker)
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.buildozer"
          echo "Build mode: ${BUILD_MODE}"
          echo "Version: ${APP_VERSION}"
          SIGN_ENV=()
          if [ "${BUILD_MODE}" = "release" ]; then
            SIGN_ENV+=( -e "P4A_RELEASE_KEYSTORE=/home/user/hostcwd/.ci/release.keystore" )
            SIGN_ENV+=( -e "P4A_RELEASE_KEYALIAS=${ANDROID_KEY_ALIAS}" )
          fi
          docker run --rm \
            -v "${{ github.workspace }}:/home/user/hostcwd" \
            -v "${HOME}/.buildozer:/home/user/.buildozer" \
            "${SIGN_ENV[@]}" \
            -e "P4A_RELEASE_KEYSTORE_PASSWD=${P4A_RELEASE_KEYSTORE_PASSWD:-}" \
            -e "P4A_RELEASE_KEYALIAS_PASSWD=${P4A_RELEASE_KEYALIAS_PASSWD:-}" \
            kivy/buildozer:latest \
            android "${BUILD_MODE}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tg-ws-proxy-debug
          path: bin/*.apk
          retention-days: 30

      - name: Публичный APK в Release
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          APK=$(ls -1 bin/*.apk | head -1)
          cp -f "$APK" tg-ws-proxy-debug.apk
          NOTES="Автосборка ${BUILD_MODE} APK. Версия: ${APP_VERSION}"
          if gh release view latest-apk --repo "${{ github.repository }}" &>/dev/null; then
            gh release upload latest-apk tg-ws-proxy-debug.apk \
              --repo "${{ github.repository }}" \
              --clobber
            gh release edit latest-apk \
              --repo "${{ github.repository }}" \
              --title "Приложение для Android (APK)" \
              --notes "${NOTES}" \
              --latest=false
          else
            gh release create latest-apk tg-ws-proxy-debug.apk \
              --repo "${{ github.repository }}" \
              --title "Приложение для Android (APK)" \
              --notes "${NOTES}" \
              --latest=false
          fi

      - name: Telegram — успех (ссылка и файл APK)
        if: success()
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram: секреты не заданы, пропуск."
            exit 0
          fi
          BASE="${{ github.server_url }}/${{ github.repository }}/releases/download/latest-apk"
          DL_APK="${BASE}/tg-ws-proxy-debug.apk"
          MSG=$(printf '%s\n\n%s\n\n%s' \
            "✅ <b>Для телефона (Android)</b>" \
            "Установочный файл — в сообщении ниже." \
            "Режим сборки: ${BUILD_MODE}, версия: ${APP_VERSION}. Ссылка: <a href=\"${DL_APK}\">скачать APK</a>")
          BODY=$(jq -n --arg c "$TELEGRAM_CHAT_ID" --arg t "$MSG" \
            '{chat_id: $c, text: $t, parse_mode: "HTML", disable_web_page_preview: true}')
          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$BODY"
          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
            -F chat_id="$TELEGRAM_CHAT_ID" \
            -F document=@"tg-ws-proxy-debug.apk" \
            -F caption=$'Установи на телефон как обычное приложение (при необходимости разреши установку из файла).' \
            || echo "::warning::Telegram: не удалось отправить APK файл (лимит бота ~50 МБ или сеть)."

      - name: Telegram — ошибка
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            exit 0
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MSG=$(printf '%s\n\n%s' \
            "❌ <b>Android</b> — сборка не удалась." \
            "<a href=\"${RUN_URL}\">Что пошло не так</a>")
          BODY=$(jq -n --arg c "$TELEGRAM_CHAT_ID" --arg t "$MSG" \
            '{chat_id: $c, text: $t, parse_mode: "HTML", disable_web_page_preview: true}')
          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$BODY"
