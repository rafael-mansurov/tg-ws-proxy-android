name: Build APK

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/build.yml"
      - "buildozer.spec"
      - "main.py"
      - "services/**"
      - "proxy/**"
      - "ui/**"
      - "tools/**"
      - "scripts/**"
      - "icon.png"
      - "presplash.png"
      - "cover.jpg"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Подготовка версии (растет на каждом запуске)
        run: |
          set -euo pipefail
          VERSION_SERIES_START_RUN=201
          ANDROID_VERSION_CODE_BASE=102410700
          PATCH_OFFSET=$((GITHUB_RUN_NUMBER - VERSION_SERIES_START_RUN))
          if [ "${PATCH_OFFSET}" -lt 0 ]; then
            echo "::error::GITHUB_RUN_NUMBER (${GITHUB_RUN_NUMBER}) is lower than VERSION_SERIES_START_RUN (${VERSION_SERIES_START_RUN})."
            exit 1
          fi
          APP_VERSION="1.6.${PATCH_OFFSET}"
          APP_NUMERIC_VERSION=$((ANDROID_VERSION_CODE_BASE + PATCH_OFFSET))
          sed -i.bak -E "s/^version = .*/version = ${APP_VERSION}/" buildozer.spec
          sed -i.bak2 -E "s/^android\\.numeric_version = .*/android.numeric_version = ${APP_NUMERIC_VERSION}/" buildozer.spec
          rm -f buildozer.spec.bak
          rm -f buildozer.spec.bak2
          printf 'APP_VERSION = "%s"\n' "${APP_VERSION}" > version.py
          echo "APP_VERSION=${APP_VERSION}" >> "${GITHUB_ENV}"
          echo "APP_NUMERIC_VERSION=${APP_NUMERIC_VERSION}" >> "${GITHUB_ENV}"

      - name: Настройка подписи и типа сборки
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_ALIAS_PASSWORD: ${{ secrets.ANDROID_KEY_ALIAS_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -n "${ANDROID_KEYSTORE_BASE64}" ] && [ -n "${ANDROID_KEYSTORE_PASSWORD}" ] && [ -n "${ANDROID_KEY_ALIAS}" ] && [ -n "${ANDROID_KEY_ALIAS_PASSWORD}" ]; then
            mkdir -p .ci
            echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > .ci/release.keystore
            chmod 600 .ci/release.keystore

            echo "BUILD_MODE=release" >> "${GITHUB_ENV}"
            echo "APK_FILENAME=tg-ws-proxy-release.apk" >> "${GITHUB_ENV}"
            echo "PUBLIC_RELEASE_TAG=latest-apk" >> "${GITHUB_ENV}"
            echo "P4A_RELEASE_KEYSTORE_PASSWD=${ANDROID_KEYSTORE_PASSWORD}" >> "${GITHUB_ENV}"
            echo "P4A_RELEASE_KEYALIAS_PASSWD=${ANDROID_KEY_ALIAS_PASSWORD}" >> "${GITHUB_ENV}"
          else
            echo "::warning::Release signing secrets are missing. Building debug APK (not suitable for stable in-place upgrades)."
            echo "BUILD_MODE=debug" >> "${GITHUB_ENV}"
            echo "APK_FILENAME=tg-ws-proxy-debug.apk" >> "${GITHUB_ENV}"
            echo "PUBLIC_RELEASE_TAG=latest-apk-debug" >> "${GITHUB_ENV}"
          fi

      - name: Cache Buildozer (project + Android SDK home)
        uses: actions/cache@v4
        with:
          path: |
            .buildozer
            /home/runner/.buildozer
          key: buildozer-${{ hashFiles('buildozer.spec', 'icon.png', 'presplash.png', 'cover.jpg', 'tools/p4a_hook.py', 'tools/p4a_webview_loader/**', 'tools/p4a_python_activity/**', 'tools/p4a_android_java/**', 'tools/p4a_android_res/**', 'p4a_recipes/**') }}-v10-sdkhome
          restore-keys: |
            buildozer-${{ hashFiles('tools/p4a_android_java/**', 'tools/p4a_python_activity/**', 'tools/p4a_hook.py', 'tools/p4a_android_res/**') }}-v10-

      - name: Build APK (kivy/buildozer docker)
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.buildozer"
          echo "Build mode: ${BUILD_MODE}"
          echo "Version: ${APP_VERSION}"
          echo "Android versionCode: ${APP_NUMERIC_VERSION}"
          SIGN_ENV=()
          if [ "${BUILD_MODE}" = "release" ]; then
            SIGN_ENV+=( -e "P4A_RELEASE_KEYSTORE=/home/user/hostcwd/.ci/release.keystore" )
            SIGN_ENV+=( -e "P4A_RELEASE_KEYALIAS=${ANDROID_KEY_ALIAS}" )
          fi
          docker run --rm \
            -v "${{ github.workspace }}:/home/user/hostcwd" \
            -v "${HOME}/.buildozer:/home/user/.buildozer" \
            "${SIGN_ENV[@]}" \
            -e "P4A_RELEASE_KEYSTORE_PASSWD=${P4A_RELEASE_KEYSTORE_PASSWD:-}" \
            -e "P4A_RELEASE_KEYALIAS_PASSWD=${P4A_RELEASE_KEYALIAS_PASSWD:-}" \
            kivy/buildozer:latest \
            android "${BUILD_MODE}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tg-ws-proxy-${{ env.BUILD_MODE }}
          path: bin/*.apk
          retention-days: 30

      - name: Публичный APK в Release
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          APK=$(ls -1 bin/*.apk | head -1)
          cp -f "$APK" "${APK_FILENAME}"
          echo "${APP_VERSION}" > version.txt
          NOTES="Автосборка ${BUILD_MODE} APK. Версия: ${APP_VERSION}"
          if [ "${BUILD_MODE}" = "release" ]; then
            RELEASE_TITLE="Приложение для Android (APK)"
          else
            RELEASE_TITLE="Приложение для Android (APK, debug)"
          fi
          if gh release view "${PUBLIC_RELEASE_TAG}" --repo "${{ github.repository }}" &>/dev/null; then
            gh release upload "${PUBLIC_RELEASE_TAG}" "${APK_FILENAME}" version.txt \
              --repo "${{ github.repository }}" \
              --clobber
            gh release edit "${PUBLIC_RELEASE_TAG}" \
              --repo "${{ github.repository }}" \
              --title "${RELEASE_TITLE}" \
              --notes "${NOTES}" \
              --latest=false
          else
            gh release create "${PUBLIC_RELEASE_TAG}" "${APK_FILENAME}" version.txt \
              --repo "${{ github.repository }}" \
              --title "${RELEASE_TITLE}" \
              --notes "${NOTES}" \
              --latest=false
          fi

      - name: Telegram — успех (ссылка и файл APK)
        if: success()
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Опционально: ID темы форума для сборок Android (секрет TELEGRAM_APK_THREAD_ID).
          TELEGRAM_APK_THREAD_ID: ${{ secrets.TELEGRAM_APK_THREAD_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram: секреты не заданы, пропуск."
            exit 0
          fi
          TG_THREAD=()
          if [ -n "${TELEGRAM_APK_THREAD_ID:-}" ]; then
            TG_THREAD=( -F "message_thread_id=${TELEGRAM_APK_THREAD_ID}" )
          fi
          BASE="${{ github.server_url }}/${{ github.repository }}/releases/download/${PUBLIC_RELEASE_TAG}"
          DL_APK="${BASE}/${APK_FILENAME}"
          TG_CHANNEL="https://t.me/+zFHFTrH7SBMzMGZi"
          case "${BUILD_MODE}" in
            release) BUILD_LABEL="Release" ;;
            debug) BUILD_LABEL="Debug" ;;
            *) BUILD_LABEL="${BUILD_MODE}" ;;
          esac
          CAPTION=$(printf $'✅ Новая версия Android. Версия: %s\nРежим: %s\n\n<a href="%s">Скачать APK</a>\n\n<a href="%s">Подпишись на Telegram канал</a>' \
            "${APP_VERSION}" "${BUILD_LABEL}" "${DL_APK}" "${TG_CHANNEL}")
          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto" \
            -F chat_id="$TELEGRAM_CHAT_ID" \
            "${TG_THREAD[@]}" \
            -F photo=@"cover.jpg" \
            -F caption="$CAPTION" \
            -F parse_mode="HTML"
          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
            -F chat_id="$TELEGRAM_CHAT_ID" \
            "${TG_THREAD[@]}" \
            -F document=@"${APK_FILENAME}" \
            || echo "::warning::Telegram: не удалось отправить APK файл (лимит бота ~50 МБ или сеть)."

      - name: Telegram — ошибка
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_APK_THREAD_ID: ${{ secrets.TELEGRAM_APK_THREAD_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            exit 0
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MSG=$(printf '%s\n\n%s' \
            "❌ <b>Android</b> — сборка не удалась." \
            "<a href=\"${RUN_URL}\">Что пошло не так</a>")
          if [ -n "${TELEGRAM_APK_THREAD_ID:-}" ]; then
            BODY=$(jq -n --arg c "$TELEGRAM_CHAT_ID" --arg t "$MSG" --arg m "$TELEGRAM_APK_THREAD_ID" \
              '{chat_id: $c, text: $t, parse_mode: "HTML", disable_web_page_preview: true, message_thread_id: ($m|tonumber)}')
          else
            BODY=$(jq -n --arg c "$TELEGRAM_CHAT_ID" --arg t "$MSG" \
              '{chat_id: $c, text: $t, parse_mode: "HTML", disable_web_page_preview: true}')
          fi
          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$BODY"
