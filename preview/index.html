<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>TG WS Proxy</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #e8eaf0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Inter', 'Segoe UI', sans-serif;
    }

    .phone {
      width: 320px;
      height: 660px;
      border-radius: 44px;
      background: #f2f3f7;
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.08),
        0 0 0 4px #dfe1e8,
        0 0 0 5px rgba(0,0,0,0.04),
        0 40px 80px rgba(0,0,0,0.18);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* dynamic island */
    .island {
      flex-shrink: 0;
      height: 36px;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      padding-bottom: 4px;
      background: #f2f3f7;
    }
    .island-pill {
      width: 110px; height: 26px;
      background: #1a1a1a;
      border-radius: 20px;
    }

    /* header */
    .header {
      flex-shrink: 0;
      padding: 8px 20px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      border-bottom: 1px solid #e8eaef;
    }
    .hicon {
      width: 42px; height: 42px;
      background: #2AABEE;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .htitles { flex: 1; }
    .htitle { color: #111; font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
    .hsub { color: #aaa; font-size: 11px; font-weight: 500; margin-top: 1px; }

    /* toggle */
    .toggle-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .toggle-track {
      width: 50px; height: 28px;
      border-radius: 14px;
      background: #dde0e8;
      position: relative;
      cursor: pointer;
      transition: background .3s;
    }
    .toggle-track.on { background: #2AABEE; }
    .toggle-thumb {
      position: absolute;
      width: 22px; height: 22px;
      background: #fff;
      border-radius: 50%;
      top: 3px; left: 3px;
      transition: left .3s cubic-bezier(.34,1.4,.64,1);
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    .toggle-track.on .toggle-thumb { left: 25px; }
    .toggle-lbl { font-size: 10px; font-weight: 600; color: #bbb; transition: color .3s; }
    .toggle-track.on + .toggle-lbl { color: #2AABEE; }

    /* status */
    .status-wrap { padding: 14px 16px 8px; }
    .status {
      border-radius: 14px;
      padding: 12px 14px;
      display: flex; align-items: center; gap: 10px;
      transition: all .35s ease;
    }
    .status.off { background: #e2e5ed; }
    .status.on  { background: #c8f0d8; border: 1px solid #a3e0bc; }

    .dot-ring {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background .35s;
    }
    .status.off .dot-ring { background: rgba(0,0,0,0.06); }
    .status.on  .dot-ring { background: rgba(34,197,94,0.15); }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      transition: background .35s;
    }
    .status.off .dot { background: #bbb; }
    .status.on  .dot { background: #22c55e; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    .status-texts { display: flex; flex-direction: column; gap: 2px; }
    .status-title { font-size: 13px; font-weight: 600; transition: color .35s; }
    .status.off .status-title { color: #999; }
    .status.on  .status-title { color: #16a34a; }
    .status-sub { font-size: 10px; }
    .status.off .status-sub { color: #ccc; }
    .status.on  .status-sub { color: #2d8a52; }

    /* cards */
    .cards { padding: 8px 16px; display: flex; flex-direction: column; gap: 8px; }
    .row { display: flex; gap: 8px; }
    .card {
      background: #fff;
      border: 1px solid #e8eaef;
      border-radius: 14px;
      padding: 12px 14px;
      flex: 1;
      display: flex; flex-direction: column; gap: 4px;
    }
    .clabel {
      color: #bbb;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .cvalue {
      color: #111;
      font-size: 14px;
      font-weight: 600;
      font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
    }
    .cvalue.secret {
      color: #2AABEE;
      font-size: 11px;
      word-break: break-all;
      line-height: 1.5;
      transition: color .3s;
    }
    .cvalue.secret.dim { color: #ccc; }

    .spacer { flex: 1; }

    /* button */
    .btn-wrap { padding: 8px 16px 10px; }
    .btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: all .25s ease;
    }
    .btn.on {
      background: #2AABEE;
      color: #fff;
    }
    .btn.on:active { opacity: .85; transform: scale(0.98); }
    .btn.off {
      background: #e8eaef;
      color: #bbb;
      cursor: default;
    }

    /* home bar */
    .homebar {
      flex-shrink: 0;
      height: 30px;
      background: #fff;
      display: flex; align-items: center; justify-content: center;
      border-top: 1px solid #e8eaef;
    }
    .homebar-pill { width: 90px; height: 4px; background: #dde0e8; border-radius: 2px; }
  </style>
</head>
<body>
<div class="phone">
  <div class="island"><div class="island-pill"></div></div>

  <div class="header">
    <div class="hicon">🔒</div>
    <div class="htitles">
      <div class="htitle">TG WS Proxy</div>
      <div class="hsub">MTProto · локальный</div>
    </div>
    <div class="toggle-wrap" onclick="onToggle()" style="cursor:pointer">
      <div class="toggle-track" id="toggle">
        <div class="toggle-thumb"></div>
      </div>
      <div class="toggle-lbl" id="toggle-lbl">Выкл</div>
    </div>
  </div>

  <div class="status-wrap">
    <div class="status off" id="status">
      <div class="dot-ring"><div class="dot"></div></div>
      <div class="status-texts">
        <div class="status-title" id="status-title">Остановлен</div>
        <div class="status-sub" id="status-sub">Включите тумблер для запуска</div>
      </div>
    </div>
  </div>

  <div class="cards">
    <div class="row">
      <div class="card">
        <div class="clabel">Сервер</div>
        <div class="cvalue">127.0.0.1</div>
      </div>
      <div class="card" style="flex: 0.6">
        <div class="clabel">Порт</div>
        <div class="cvalue">1443</div>
      </div>
    </div>
    <div class="card">
      <div class="clabel">Secret</div>
      <div class="cvalue secret dim" id="secret-val">––––––––––––––––</div>
    </div>
  </div>

  <div class="spacer"></div>

  <div class="btn-wrap">
    <button class="btn off" id="tg-btn" onclick="openTelegram()">Открыть в Telegram</button>
  </div>

  <div class="homebar"><div class="homebar-pill"></div></div>
</div>

<script>
  const SECRET = 'a3f8c2d1e4b57690fe12ab34cd56ef78';
  let running = false;

  function onToggle() {
    running = !running;
    document.getElementById('toggle').classList.toggle('on', running);
    document.getElementById('toggle-lbl').textContent = running ? 'Вкл' : 'Выкл';
    document.getElementById('status').className = 'status ' + (running ? 'on' : 'off');
    document.getElementById('status-title').textContent = running ? 'Прокси запущен' : 'Остановлен';
    document.getElementById('status-sub').textContent  = running ? 'Работает в фоне' : 'Включите тумблер для запуска';
    const sv = document.getElementById('secret-val');
    sv.textContent = running ? SECRET : '––––––––––––––––';
    sv.classList.toggle('dim', !running);
    document.getElementById('tg-btn').className = 'btn ' + (running ? 'on' : 'off');
  }

  function openTelegram() {
    if (!running) return;
    window.location.href = `tg://proxy?server=127.0.0.1&port=1443&secret=${SECRET}`;
  }
</script>
</body>
</html>
